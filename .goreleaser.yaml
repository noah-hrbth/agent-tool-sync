version: 2

project_name: agentsync

before:
  hooks:
    - go mod tidy

builds:
  - id: agentsync
    main: ./cmd/agentsync
    binary: agentsync
    ldflags:
      - -s -w
      - -X github.com/noah-hrbth/agentsync/cmd/agentsync.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: agentsync
    builds: [agentsync]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

brews:
  - name: agentsync
    homepage: https://github.com/noah-hrbth/agent-tool-sync
    description: "Sync AI tool configs (rules, skills, agents, commands) across Claude Code, Cursor, OpenCode, Gemini CLI, and more."
    license: MIT
    repository:
      owner: noah-hrbth
      name: homebrew-agentsync
    install: |
      bin.install "agentsync"
    test: |
      system "#{bin}/agentsync version"

release:
  github:
    owner: noah-hrbth
    name: agent-tool-sync
  draft: false
  prerelease: auto
